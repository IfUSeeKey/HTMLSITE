<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="utf-8">
        <title> Трансформация и анимация. Лабораторная работа</title>
        <link rel="stylesheet" href="CSS/style.css">
        <script src="http://d3js.org/d3.v7.min.js"> </script>
        <script src="JavaScript/main.js"></script>
        <script src="JavaScript/image.js"></script>
        <script src="JavaScript/path.js"></script>
    </head>
    <body>   
        <form id="setting">
            <p>Практическая работа 2</p>
            <hr>
            <p class="ubrat"><b>Координаты рисунка</b><br>
                <label for="cx">x: </label>
                <input type="number" id="cx"                   value="300" max="600"   min="0">
                <label for="cx2"     class="animationElements">до</label>
                <input type="number" class="animationElements" id="cx2"    value="500" max="600" min="0"><br>

                <label for="cy">y: </label>
                <input type="number" id="cy" value="300" max="600" min="0">
                <label for="cy2"     class="animationElements">до</label>
                <input type="number" class="animationElements" id="cy2"    value="500" max="600" min="0"><br>
            </p>

            <p class="dobavit"><b>Пути перемещения</b><br>
                <select id="waySelect">
                    <option value="0">Синусоида</option>
                    <option value="1">По кругу</option>
                </select>            
            </p>

            <p><b>Масштаб</b><br>
                <label for="mx">по x: </label>
                <input type="number" id="mx" value="1"   max="10"  min="0">
                <label for="mx2"     class="animationElements">до</label>
                <input type="number" class="animationElements" id="mx2"    value="2" max="10" min="0"><br>
                

                <label for="my">по y: </label>
                <input type="number" id="my" value="1"   max="10"  min="0">
                <label for="my2"     class="animationElements">до</label>
                <input type="number" class="animationElements" id="my2"    value="2" max="10" min="0">
            </p>

            <p><b>Поворот</b><br>
                <label for="rotate">угол: </label>
                <input type="number" id="rotate" value="0" max="360" min="0">
                <label for="rotate2" class="animationElements">до</label>
                <input type="number" class="animationElements" id="rotate2" value="180" max="360" min="0">
                                
            </p>

            <p class="animationElements"><b>Скорость анимации</b>
                <label for="animSpeed">Скорость: </label>
                <input type="number" id="animSpeed" value="6000" min="0" max="20000">
            </p>

            <p>
                <input id="drawButton" type="button" value="Нарисовать">
                <input id="deleteButton" type="button" value="Очистить">
            </p>
            
            <p>
                <input  type="checkbox"  id="animationCheckBox">
                <label  for="animationCheckBox">Включить анимацию?</label>
                <select id="animationEffect" class="animationElements">
                    <option value="linear">linear</option>
                    <option value="elastic">elastic</option>
                    <option value="bounce">bounce</option>
                </select>
            </p> 

            <p class="animationElements">
                <input type="checkbox" id="vklyuchitPut">
                <label for="vklyuchitPut">Перемещение вдоль пути?</label>
            </p>
        
            <p>
                <input class="animationElements" id="animateButton" type="button" value="Анимировать">
            </p>
        </form>

        <svg></svg>

    </body>
</html>
